version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    binary: redmine

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

brews:
  - name: redmine-cli
    homepage: "https://github.com/nbifrye/redmine-cli"
    description: "CLI for interacting with the Redmine REST API"
    license: "MIT"
    repository:
      owner: nbifrye
      name: redmine-cli
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    install: |
      bin.install "redmine"
    test: |
      system "#{bin}/redmine", "--help"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore: update Homebrew formula to {{ .Tag }}"
